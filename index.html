<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="–†–∞—Б–Ї—А–Њ–є –Ь–Ф–§">
    <meta name="theme-color" content="#007aff">
    <title>–†–∞—Б–Ї—А–Њ–є –Ь–Ф–§ вАФ Liquid Glass</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* –Я–ї–∞–≤–љ–Њ –њ–µ—А–µ–ї–Є–≤–∞—О—Й–Є–є—Б—П –≥—А–∞–і–Є–µ–љ—В–љ—Л–є —Д–Њ–љ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 16px 40px 16px;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
            background-size: 400% 400%;
            position: relative;
            animation: gradientFlow 12s ease infinite;
        }
        
        /* –Р–љ–Є–Љ–∞—Ж–Є—П –њ–µ—А–µ–ї–Є–≤–∞ –≥—А–∞–і–Є–µ–љ—В–∞ */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* –Ф–Њ–њ–Њ–ї–љ–Є—В–µ–ї—М–љ—Л–є —Б–ї–Њ–є —Б —Ж–≤–µ—В–љ—Л–Љ–Є –±–ї–Є–Ї–∞–Љ–Є (–ї—С–≥–Ї–Њ–µ —А–∞–Ј–Љ—Л—В–Є–µ) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,100,100,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(100,100,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(255,200,100,0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 20%, rgba(100,255,100,0.1) 0%, transparent 40%);
            pointer-events: none;
        }
        
        /* –°—В–µ–Ї–ї—П–љ–љ—Л–µ –Ї–∞—А—В–Њ—З–Ї–Є */
        .glass-card {
            background: rgba(30, 30, 35, 0.55);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            margin-top: 8px;
        }
        .header-icon {
            width: 60px;
            height: 60px;
            background: rgba(120, 120, 128, 0.25);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
        }
        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-text h1 { 
            font-size: 28px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #fff 0%, #c0c0d0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-text p { font-size: 14px; color: rgba(255,255,255,0.7); }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
            letter-spacing: -0.2px;
        }
        
        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        
        textarea, input {
            width: 100%;
            background: rgba(50, 50, 55, 0.5);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.2s;
        }
        textarea:focus, input:focus {
            border-color: rgba(0, 122, 255, 0.8);
            background: rgba(60, 60, 65, 0.7);
        }
        textarea::placeholder, input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 100px; }
        
        button {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        button:active { transform: scale(0.97); background: #005fc1; }
        
        .results-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .result-item {
            flex: 1;
            background: rgba(50, 50, 55, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .result-item .value { font-size: 34px; font-weight: 700; color: #0a84ff; }
        .result-item .label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; }
        
        .copy-btn {
            background: #34c759;
            color: #000;
            box-shadow: 0 4px 12px rgba(52,199,89,0.3);
        }
        .copy-btn:active { background: #28a745; }
        
        .visual-slat {
            height: 44px;
            background: rgba(60, 60, 65, 0.5);
            display: flex;
            margin: 16px 0 12px 0;
            border-radius: 14px;
            overflow: hidden;
        }
        .slat-part {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: #007aff;
            color: white;
        }
        .color-waste {
            background: rgba(80, 80, 85, 0.7);
            color: rgba(255,255,255,0.5);
        }
        
        .instruction-card {
            background: rgba(40, 40, 45, 0.45);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .inst-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
            color: #0a84ff;
        }
        .pattern-text {
            font-family: monospace;
            font-size: 13px;
            background: rgba(30,30,35,0.5);
            padding: 8px 12px;
            border-radius: 14px;
            margin: 8px 0;
            color: rgba(255,255,255,0.9);
        }
        
        #text_for_whatsapp {
            width: 100%;
            background: rgba(30,30,35,0.7);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 14px;
            font-family: monospace;
            font-size: 12px;
            color: #fff;
            margin-bottom: 12px;
            display: none;
            resize: vertical;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">
        <img src="icon.png" alt="–Ф–Є—Б–Ї–Њ–≤–∞—П –њ–Є–ї–∞ —Б –ї–Є–љ–µ–є–Ї–Њ–є">
    </div>
    <div class="header-text">
        <h1>–†–∞—Б–Ї—А–Њ–є –Ь–Ф–§</h1>
        <p>–Я—А–Њ—Д–µ—Б—Б–Є–Њ–љ–∞–ї—М–љ—Л–є –Ї–∞–ї—М–Ї—Г–ї—П—В–Њ—А —А–∞—Б–Ї—А–Њ—П</p>
    </div>
</div>

<div class="glass-card">
    <div class="section-title">рЯУР –Я–∞—А–∞–Љ–µ—В—А—Л —А–∞—Б—З—С—В–∞</div>
    <label>–Ч–∞–Ї–∞–Ј (–®—Е–Т - –Ъ–Њ–ї-–≤–Њ):</label>
    <textarea id="order_input">30—Е20 - 350
40—Е25 - 200</textarea>
    <div class="input-group">
        <div><label>–†–µ–є–Ї–∞ (—Б–Љ):</label><input type="number" id="slat_len" value="272" step="any"></div>
        <div><label>–Т –њ–∞—З–Ї–µ (—И—В):</label><input type="number" id="pack_size" value="26"></div>
        <div><label>–Ф–Є—Б–Ї (–Љ–Љ):</label><input type="number" id="blade" value="3" step="any"></div>
    </div>
    <button onclick="runCalc()">рЯ™Ъ –†–Р–°–°–І–Ш–Ґ–Р–Ґ–ђ</button>
</div>

<div class="glass-card" id="results" style="display: none;">
    <div class="section-title">рЯУК –†–µ–Ј—Г–ї—М—В–∞—В—Л</div>
    <div id="stats_area"></div>
    <div class="section-title">рЯУЛ –Ч–∞–Ї–∞–Ј –≤ —А–∞—Б–њ–Є–ї</div>
    <textarea id="text_for_whatsapp" readonly></textarea>
    <button class="copy-btn" onclick="copyText()">рЯУ≤ –°–Ї–Њ–њ–Є—А–Њ–≤–∞—В—М –і–ї—П WhatsApp</button>
    <div class="section-title">рЯЫ† –°—Е–µ–Љ–∞ —А–∞—Б–њ–Є–ї–∞</div>
    <div id="map_area"></div>
</div>

<script>
function runCalc() {
    try {
        let orderText = document.getElementById('order_input').value;
        let slatLen = parseFloat(document.getElementById('slat_len').value);
        let packSize = parseInt(document.getElementById('pack_size').value);
        let bladeMM = parseFloat(document.getElementById('blade').value);
        let blade = bladeMM / 10;
        
        if (!orderText.trim()) throw new Error('–Т–≤–µ–і–Є—В–µ –Ј–∞–Ї–∞–Ј');
        if (isNaN(slatLen) || slatLen <= 0) throw new Error('–Ф–ї–Є–љ–∞ —А–µ–є–Ї–Є > 0');
        
        let demands = {};
        let regex = /(\d+(?:\.\d+)?)[\s—ЕxX√Ч*](\d+(?:\.\d+)?)[\s\-:=]+(\d+)/g;
        let m;
        while ((m = regex.exec(orderText)) !== null) {
            let w = parseFloat(m[1]), h = parseFloat(m[2]), qty = parseInt(m[3]);
            demands[w] = (demands[w] || 0) + qty * 2;
            demands[h] = (demands[h] || 0) + qty * 2;
        }
        if (Object.keys(demands).length === 0) throw new Error('–§–Њ—А–Љ–∞—В: 30—Е20 - 350');
        
        let lengths = Object.keys(demands).map(Number).sort((a,b)=>b-a);
        
        let patterns = [];
        let cur = new Array(lengths.length).fill(0);
        function generate(idx, usedLen) {
            if (idx === lengths.length) {
                if (usedLen > 0) patterns.push([...cur]);
                return;
            }
            let maxCnt = Math.floor((slatLen - usedLen) / (lengths[idx] + blade));
            for (let i = maxCnt; i >= 0; i--) {
                cur[idx] = i;
                generate(idx+1, usedLen + i * (lengths[idx] + blade));
            }
        }
        generate(0, 0);
        
        let need = {};
        for (let k in demands) need[k] = demands[k];
        
        let plan = [];
        let safety = 0;
        
        function hasNeed() {
            for (let k in need) if (need[k] > 0) return true;
            return false;
        }
        
        while (hasNeed() && safety++ < 2000) {
            let bestPattern = null;
            let bestScore = -Infinity;
            
            for (let p of patterns) {
                let usedLen = 0;
                let score = 0;
                let hits = false;
                for (let i=0; i<lengths.length; i++) {
                    let cnt = p[i];
                    if (cnt === 0) continue;
                    let len = lengths[i];
                    usedLen += cnt * (len + blade);
                    if (need[len] > 0) {
                        score += Math.min(cnt, need[len]) * len;
                        hits = true;
                    }
                }
                if (!hits) continue;
                let waste = slatLen - usedLen;
                score -= waste;
                if (score > bestScore) {
                    bestScore = score;
                    bestPattern = p;
                }
            }
            if (!bestPattern) break;
            
            let steps = Infinity;
            for (let i=0; i<lengths.length; i++) {
                if (bestPattern[i] > 0 && need[lengths[i]] > 0) {
                    steps = Math.min(steps, Math.ceil(need[lengths[i]] / bestPattern[i]));
                }
            }
            if (!isFinite(steps)) steps = 1;
            
            for (let i=0; i<lengths.length; i++) {
                need[lengths[i]] -= bestPattern[i] * steps;
            }
            plan.push({ pattern: bestPattern, count: steps });
        }
        
        let totalSticks = plan.reduce((s,item)=>s+item.count,0);
        let packs = Math.floor(totalSticks / packSize);
        let loose = totalSticks % packSize;
        
        document.getElementById('stats_area').innerHTML = `
            <div class="results-grid">
                <div class="result-item"><div class="value">${totalSticks} —И—В</div><div class="label">–Т—Б–µ–≥–Њ —А–µ–µ–Ї</div></div>
                <div class="result-item"><div class="value">${packs}</div><div class="label">–Я–∞—З–µ–Ї</div></div>
                <div class="result-item"><div class="value">${loose}</div><div class="label">–Ю—Б—В–∞—В–Њ–Ї</div></div>
            </div>
        `;
        
        let waText = `рЯУ¶ –Ч–Р–Ъ–Р–Ч –Т –†–Р–°–Я–Ш–Ы\n–Т—Б–µ–≥–Њ —А–µ–µ–Ї: ${totalSticks} —И—В (${packs} –њ–∞—З. + ${loose} —И—В.)\n\nрЯЫ† –Ъ–Р–†–Ґ–Р –†–Р–°–Я–Ш–Ы–Р:\n`;
        let htmlMap = '';
        
        for (let idx=0; idx<plan.length; idx++) {
            let item = plan[idx];
            if (item.count === 0) continue;
            let pCount = Math.floor(item.count / packSize);
            let lCount = item.count % packSize;
            let countTxt = pCount > 0 ? (pCount + ' –њ–∞—З.' + (lCount > 0 ? ` –Є ${lCount} —И—В.` : '')) : (lCount + ' —И—В.');
            
            let counts = {};
            for (let i=0; i<lengths.length; i++) {
                if (item.pattern[i] > 0) {
                    counts[lengths[i]] = item.pattern[i];
                }
            }
            
            let partsList = [];
            for (let len in counts) {
                partsList.push(`${len} —Б–Љ вАФ ${counts[len]} —И—В`);
            }
            let partsText = partsList.join(', ');
            
            let usedLenTotal = 0;
            for (let i=0; i<lengths.length; i++) {
                usedLenTotal += item.pattern[i] * (lengths[i] + blade);
            }
            let rest = slatLen - usedLenTotal;
            
            waText += `\n${idx+1}. –Я–Є–ї–Є—В—М: ${countTxt} (${item.count} —А–µ–µ–Ї)\n${partsText}${rest > 0.1 ? `, –Њ—В—Е–Њ–і ${rest.toFixed(1)} —Б–Љ` : ''}\n`;
            
            let visual = '<div class="visual-slat">';
            let visUsed = 0;
            for (let i=0; i<lengths.length; i++) {
                for (let c=0; c<item.pattern[i]; c++) {
                    visual += `<div class="slat-part" style="flex-grow: ${lengths[i]}">${lengths[i]}</div>`;
                    visUsed += lengths[i] + blade;
                }
            }
            let visRest = slatLen - visUsed;
            if (visRest > 0.1) visual += `<div class="slat-part color-waste" style="flex-grow: ${visRest}">${visRest.toFixed(1)}</div>`;
            visual += '</div>';
            
            htmlMap += `
                <div class="instruction-card">
                    <div class="inst-header">рЯ™Ъ –†–µ–Ј вДЦ${idx+1} вАФ –Я–Є–ї–Є—В—М: ${countTxt}</div>
                    <div class="pattern-text">рЯУП ${partsText}${rest > 0.1 ? `, –Њ—В—Е–Њ–і ${rest.toFixed(1)} —Б–Љ` : ''}</div>
                    ${visual}
                </div>
            `;
        }
        
        document.getElementById('text_for_whatsapp').value = waText;
        document.getElementById('text_for_whatsapp').style.display = 'block';
        document.getElementById('map_area').innerHTML = htmlMap;
        document.getElementById('results').style.display = 'block';
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        
    } catch(e) {
        alert('–Ю—И–Є–±–Ї–∞: ' + e.message);
    }
}

function copyText() {
    let txt = document.getElementById('text_for_whatsapp');
    txt.select();
    txt.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(txt.value).then(() => {
        let btn = document.querySelector('.copy-btn');
        let orig = btn.innerHTML;
        btn.innerHTML = 'вЬЕ –°–Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Њ!';
        setTimeout(() => btn.innerHTML = orig, 2000);
    });
}
</script>
</body>
</html>
