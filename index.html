<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Раскрой МДФ">
    <meta name="theme-color" content="#007aff">
    <title>Раскрой МДФ</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #f5f5f7;
            color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 16px 40px 16px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            margin-top: 8px;
        }
        .header-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 122, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-text h1 { font-size: 28px; font-weight: 700; color: #1c1c1e; }
        .header-text p { font-size: 14px; color: #6c6c70; }
        
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02);
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        label {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            color: #6c6c70;
            display: block;
            margin-bottom: 6px;
        }
        textarea, input {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #e9e9ef;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 16px;
            color: #1c1c1e;
            margin-bottom: 20px;
            outline: none;
        }
        textarea:focus, input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 100px; }
        
        button {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.15s ease;
        }
        button:active { transform: scale(0.97); background: #005fc1; }
        
        .results-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .result-item {
            flex: 1;
            background: #f5f5f7;
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            border: 0.5px solid #e9e9ef;
        }
        .result-item .value { font-size: 32px; font-weight: 700; color: #007aff; }
        .result-item .label { font-size: 13px; color: #6c6c70; margin-top: 6px; }
        
        .copy-btn {
            background: #34c759;
            color: #000;
            margin-bottom: 20px;
        }
        .copy-btn:active { background: #28a745; }
        
        .visual-slat {
            height: 44px;
            background: #e9e9ef;
            display: flex;
            margin: 16px 0 12px 0;
            border-radius: 12px;
            overflow: hidden;
        }
        .slat-part {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: #007aff;
            color: white;
        }
        .color-waste {
            background: #e9e9ef;
            color: #8e8e93;
        }
        
        .instruction-card {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 0.5px solid #e9e9ef;
        }
        .inst-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
            color: #007aff;
        }
        .pattern-text {
            font-family: monospace;
            font-size: 14px;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 8px 0;
        }
        
        #text_for_whatsapp {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #e9e9ef;
            border-radius: 14px;
            padding: 14px;
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
            resize: vertical;
        }

        /* --- УЛУЧШЕНИЕ 2: Плавное появление результатов --- */
        #results {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #results.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">
        <img src="icon.png" alt="Дисковая пила с линейкой">
    </div>
    <div class="header-text">
        <h1>Раскрой МДФ</h1>
        <p>Профессиональный калькулятор раскроя</p>
    </div>
</div>

<div class="card">
    <div class="section-title">📐 Параметры расчёта</div>
    <label>Заказ (ШхВ - Кол-во):</label>
    <textarea id="order_input">30х20 - 350
40х25 - 200</textarea>
    <div class="input-group">
        <div><label>Рейка (см):</label><input type="number" id="slat_len" value="272" step="any"></div>
        <div><label>В пачке (шт):</label><input type="number" id="pack_size" value="26"></div>
        <div><label>Диск (мм):</label><input type="number" id="blade" value="3" step="any"></div>
    </div>
    <button onclick="runCalc()">🪚 РАССЧИТАТЬ</button>
</div>

<div class="card" id="results">
    <div class="section-title">📊 Результаты</div>
    <div id="stats_area"></div>
    <div class="section-title">📋 Заказ в распил</div>
    <textarea id="text_for_whatsapp" readonly></textarea>
    <button class="copy-btn" onclick="copyText()">📲 Скопировать для WhatsApp</button>
    <div class="section-title">🛠 Схема распила</div>
    <div id="map_area"></div>
</div>

<script>
function runCalc() {
    try {
        let orderText = document.getElementById('order_input').value;
        let slatLen = parseFloat(document.getElementById('slat_len').value);
        let packSize = parseInt(document.getElementById('pack_size').value);
        let bladeMM = parseFloat(document.getElementById('blade').value);
        let blade = bladeMM / 10;
        
        if (!orderText.trim()) throw new Error('Введите заказ');
        if (isNaN(slatLen) || slatLen <= 0) throw new Error('Длина рейки > 0');
        
        let demands = {};
        let regex = /(\d+(?:\.\d+)?)[\sхxX×*](\d+(?:\.\d+)?)[\s\-:=]+(\d+)/g;
        let m;
        while ((m = regex.exec(orderText)) !== null) {
            let w = parseFloat(m[1]), h = parseFloat(m[2]), qty = parseInt(m[3]);
            demands[w] = (demands[w] || 0) + qty * 2;
            demands[h] = (demands[h] || 0) + qty * 2;
        }
        if (Object.keys(demands).length === 0) throw new Error('Формат: 30х20 - 350');
        
        let lengths = Object.keys(demands).map(Number).sort((a,b)=>b-a);
        
        let patterns = [];
        let cur = new Array(lengths.length).fill(0);
        function generate(idx, usedLen) {
            if (idx === lengths.length) {
                if (usedLen > 0) patterns.push([...cur]);
                return;
            }
            let maxCnt = Math.floor((slatLen - usedLen) / (lengths[idx] + blade));
            for (let i = maxCnt; i >= 0; i--) {
                cur[idx] = i;
                generate(idx+1, usedLen + i * (lengths[idx] + blade));
            }
        }
        generate(0, 0);
        
        let need = {};
        for (let k in demands) need[k] = demands[k];
        
        let plan = [];
        let safety = 0;
        
        function hasNeed() {
            for (let k in need) if (need[k] > 0) return true;
            return false;
        }
        
        while (hasNeed() && safety++ < 2000) {
            let bestPattern = null;
            let bestScore = -Infinity;
            
            for (let p of patterns) {
                let usedLen = 0;
                let score = 0;
                let hits = false;
                for (let i=0; i<lengths.length; i++) {
                    let cnt = p[i];
                    if (cnt === 0) continue;
                    let len = lengths[i];
                    usedLen += cnt * (len + blade);
                    if (need[len] > 0) {
                        score += Math.min(cnt, need[len]) * len;
                        hits = true;
                    }
                }
                if (!hits) continue;
                let waste = slatLen - usedLen;
                score -= waste;
                if (score > bestScore) {
                    bestScore = score;
                    bestPattern = p;
                }
            }
            if (!bestPattern) break;
            
            let steps = Infinity;
            for (let i=0; i<lengths.length; i++) {
                if (bestPattern[i] > 0 && need[lengths[i]] > 0) {
                    steps = Math.min(steps, Math.ceil(need[lengths[i]] / bestPattern[i]));
                }
            }
            if (!isFinite(steps)) steps = 1;
            
            for (let i=0; i<lengths.length; i++) {
                need[lengths[i]] -= bestPattern[i] * steps;
            }
            plan.push({ pattern: bestPattern, count: steps });
        }
        
        let totalSticks = plan.reduce((s,item)=>s+item.count,0);
        let packs = Math.floor(totalSticks / packSize);
        let loose = totalSticks % packSize;
        
        document.getElementById('stats_area').innerHTML = `
            <div class="results-grid">
                <div class="result-item"><div class="value">${totalSticks} шт</div><div class="label">Всего реек</div></div>
                <div class="result-item"><div class="value">${packs}</div><div class="label">Пачек</div></div>
                <div class="result-item"><div class="value">${loose}</div><div class="label">Остаток</div></div>
            </div>
        `;
        
        let waText = `📦 ЗАКАЗ В РАСПИЛ\nВсего реек: ${totalSticks} шт (${packs} пач. + ${loose} шт.)\n\n🛠 КАРТА РАСПИЛА:\n`;
        let htmlMap = '';
        
        // --- УЛУЧШЕНИЕ 4: Цветные иконки для схем ---
        const icons = ['🔵', '🟢', '🟠', '🟣', '🔴', '🟡', '🟤', '⚪️'];
        
        for (let idx=0; idx<plan.length; idx++) {
            let item = plan[idx];
            if (item.count === 0) continue;
            let pCount = Math.floor(item.count / packSize);
            let lCount = item.count % packSize;
            let countTxt = pCount > 0 ? (pCount + ' пач.' + (lCount > 0 ? ` и ${lCount} шт.` : '')) : (lCount + ' шт.');
            
            let counts = {};
            for (let i=0; i<lengths.length; i++) {
                if (item.pattern[i] > 0) {
                    counts[lengths[i]] = item.pattern[i];
                }
            }
            
            let partsList = [];
            for (let len in counts) {
                partsList.push(`${len} см — ${counts[len]} шт`);
            }
            let partsText = partsList.join(', ');
            
            let usedLenTotal = 0;
            for (let i=0; i<lengths.length; i++) {
                usedLenTotal += item.pattern[i] * (lengths[i] + blade);
            }
            let rest = slatLen - usedLenTotal;
            
            waText += `\n${idx+1}. Пилить: ${countTxt} (${item.count} реек)\n${partsText}${rest > 0.1 ? `, отход ${rest.toFixed(1)} см` : ''}\n`;
            
            let visual = '<div class="visual-slat">';
            let visUsed = 0;
            for (let i=0; i<lengths.length; i++) {
                for (let c=0; c<item.pattern[i]; c++) {
                    visual += `<div class="slat-part" style="flex-grow: ${lengths[i]}">${lengths[i]}</div>`;
                    visUsed += lengths[i] + blade;
                }
            }
            let visRest = slatLen - visUsed;
            if (visRest > 0.1) visual += `<div class="slat-part color-waste" style="flex-grow: ${visRest}">${visRest.toFixed(1)}</div>`;
            visual += '</div>';
            
            // Используем иконку по индексу (зацикливаем)
            let icon = icons[idx % icons.length];
            
            htmlMap += `
                <div class="instruction-card">
                    <div class="inst-header">${icon} Схема #${idx+1} — Пилить: ${countTxt}</div>
                    <div class="pattern-text">📏 ${partsText}${rest > 0.1 ? `, отход ${rest.toFixed(1)} см` : ''}</div>
                    ${visual}
                </div>
            `;
        }
        
        document.getElementById('text_for_whatsapp').value = waText;
        document.getElementById('text_for_whatsapp').style.display = 'block';
        document.getElementById('map_area').innerHTML = htmlMap;
        
        // --- УЛУЧШЕНИЕ 2: Активируем плавное появление ---
        const results = document.getElementById('results');
        results.style.display = 'block';
        // Небольшая задержка, чтобы CSS transition сработала
        setTimeout(() => results.classList.add('visible'), 10);
        results.scrollIntoView({ behavior: 'smooth' });
        
    } catch(e) {
        alert('Ошибка: ' + e.message);
    }
}

function copyText() {
    let txt = document.getElementById('text_for_whatsapp');
    txt.select();
    txt.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(txt.value).then(() => {
        let btn = document.querySelector('.copy-btn');
        let orig = btn.innerHTML;
        btn.innerHTML = '✅ Скопировано!';
        setTimeout(() => btn.innerHTML = orig, 2000);
    });
}
</script>
</body>
</html>
