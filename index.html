<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="–†–į—Ā–ļ—Ä–ĺ–Ļ –ú–Ē–§">
    <meta name="theme-color" content="#007aff">
    <title>–†–į—Ā–ļ—Ä–ĺ–Ļ –ú–Ē–§</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #f5f5f7;
            color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 16px 40px 16px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            margin-top: 8px;
        }
        .header-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 122, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-text h1 { font-size: 28px; font-weight: 700; color: #1c1c1e; }
        .header-text p { font-size: 14px; color: #6c6c70; }
        
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02);
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        label {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            color: #6c6c70;
            display: block;
            margin-bottom: 6px;
        }
        textarea, input {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #e9e9ef;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 16px;
            color: #1c1c1e;
            margin-bottom: 20px;
            outline: none;
        }
        textarea:focus, input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 100px; }
        
        button {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.15s ease;
        }
        button:active { transform: scale(0.97); background: #005fc1; }
        
        .results-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .result-item {
            flex: 1;
            background: #f5f5f7;
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            border: 0.5px solid #e9e9ef;
        }
        .result-item .value { font-size: 32px; font-weight: 700; color: #007aff; }
        .result-item .label { font-size: 13px; color: #6c6c70; margin-top: 6px; }
        
        .copy-btn {
            background: #34c759;
            color: #000;
            margin-bottom: 20px;
        }
        .copy-btn:active { background: #28a745; }
        
        .visual-slat {
            height: 44px;
            background: #e9e9ef;
            display: flex;
            margin: 16px 0 12px 0;
            border-radius: 12px;
            overflow: hidden;
        }
        .slat-part {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .color-waste {
            background: #e9e9ef;
            color: #8e8e93;
        }
        
        .instruction-card {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 0.5px solid #e9e9ef;
        }
        .inst-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
            color: #007aff;
        }
        .pattern-text {
            font-family: monospace;
            font-size: 14px;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 8px 0;
        }
        
        #text_for_whatsapp {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #e9e9ef;
            border-radius: 14px;
            padding: 14px;
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
            resize: vertical;
        }

        /* --- –£–õ–£–ß–®–ē–Ě–ė–ē 2: –ü–Ľ–į–≤–Ĺ–ĺ–Ķ –Ņ–ĺ—Ź–≤–Ľ–Ķ–Ĺ–ł–Ķ —Ä–Ķ–∑—É–Ľ—Ć—ā–į—ā–ĺ–≤ --- */
        #results {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #results.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">
        <img src="icon.png" alt="–Ē–ł—Ā–ļ–ĺ–≤–į—Ź –Ņ–ł–Ľ–į —Ā –Ľ–ł–Ĺ–Ķ–Ļ–ļ–ĺ–Ļ">
    </div>
    <div class="header-text">
        <h1>–†–į—Ā–ļ—Ä–ĺ–Ļ –ú–Ē–§</h1>
        <p>–ü—Ä–ĺ—Ą–Ķ—Ā—Ā–ł–ĺ–Ĺ–į–Ľ—Ć–Ĺ—č–Ļ –ļ–į–Ľ—Ć–ļ—É–Ľ—Ź—ā–ĺ—Ä —Ä–į—Ā–ļ—Ä–ĺ—Ź</p>
    </div>
</div>

<div class="card">
    <div class="section-title">ūüďź –ü–į—Ä–į–ľ–Ķ—ā—Ä—č —Ä–į—Ā—á—Ď—ā–į</div>
    <label>–ó–į–ļ–į–∑ (–®—Ö–í - –ö–ĺ–Ľ-–≤–ĺ):</label>
    <textarea id="order_input">30—Ö20 - 350
40—Ö25 - 200</textarea>
    <div class="input-group">
        <div><label>–†–Ķ–Ļ–ļ–į (—Ā–ľ):</label><input type="number" id="slat_len" value="272" step="any"></div>
        <div><label>–í –Ņ–į—á–ļ–Ķ (—ą—ā):</label><input type="number" id="pack_size" value="26"></div>
        <div><label>–Ē–ł—Ā–ļ (–ľ–ľ):</label><input type="number" id="blade" value="3" step="any"></div>
    </div>
    <button onclick="runCalc()">ūü™ö –†–ź–°–°–ß–ė–Ę–ź–Ę–¨</button>
</div>

<div class="card" id="results">
    <div class="section-title">ūüďä –†–Ķ–∑—É–Ľ—Ć—ā–į—ā—č</div>
    <div id="stats_area"></div>
    <div class="section-title">ūüďč –ó–į–ļ–į–∑ –≤ —Ä–į—Ā–Ņ–ł–Ľ</div>
    <textarea id="text_for_whatsapp" readonly></textarea>
    <button class="copy-btn" onclick="copyText()">ūüď≤ –°–ļ–ĺ–Ņ–ł—Ä–ĺ–≤–į—ā—Ć –ī–Ľ—Ź WhatsApp</button>
    <div class="section-title">ūüõ† –°—Ö–Ķ–ľ–į —Ä–į—Ā–Ņ–ł–Ľ–į</div>
    <div id="map_area"></div>
</div>

<script>
function runCalc() {
    try {
        let orderText = document.getElementById('order_input').value;
        let slatLen = parseFloat(document.getElementById('slat_len').value);
        let packSize = parseInt(document.getElementById('pack_size').value);
        let bladeMM = parseFloat(document.getElementById('blade').value);
        let blade = bladeMM / 10;
        
        if (!orderText.trim()) throw new Error('–í–≤–Ķ–ī–ł—ā–Ķ –∑–į–ļ–į–∑');
        if (isNaN(slatLen) || slatLen <= 0) throw new Error('–Ē–Ľ–ł–Ĺ–į —Ä–Ķ–Ļ–ļ–ł > 0');
        
        let demands = {};
        let regex = /(\d+(?:\.\d+)?)[\s—ÖxX√ó*](\d+(?:\.\d+)?)[\s\-:=]+(\d+)/g;
        let m;
        while ((m = regex.exec(orderText)) !== null) {
            let w = parseFloat(m[1]), h = parseFloat(m[2]), qty = parseInt(m[3]);
            demands[w] = (demands[w] || 0) + qty * 2;
            demands[h] = (demands[h] || 0) + qty * 2;
        }
        if (Object.keys(demands).length === 0) throw new Error('–§–ĺ—Ä–ľ–į—ā: 30—Ö20 - 350');
        
        let lengths = Object.keys(demands).map(Number).sort((a,b)=>b-a);
        
        let patterns = [];
        let cur = new Array(lengths.length).fill(0);
        function generate(idx, usedLen) {
            if (idx === lengths.length) {
                if (usedLen > 0) patterns.push([...cur]);
                return;
            }
            let maxCnt = Math.floor((slatLen - usedLen) / (lengths[idx] + blade));
            for (let i = maxCnt; i >= 0; i--) {
                cur[idx] = i;
                generate(idx+1, usedLen + i * (lengths[idx] + blade));
            }
        }
        generate(0, 0);
        
        let need = {};
        for (let k in demands) need[k] = demands[k];
        
        let plan = [];
        let safety = 0;
        
        function hasNeed() {
            for (let k in need) if (need[k] > 0) return true;
            return false;
        }
        
        while (hasNeed() && safety++ < 2000) {
            let bestPattern = null;
            let bestScore = -Infinity;
            
            for (let p of patterns) {
                let usedLen = 0;
                let score = 0;
                let hits = false;
                for (let i=0; i<lengths.length; i++) {
                    let cnt = p[i];
                    if (cnt === 0) continue;
                    let len = lengths[i];
                    usedLen += cnt * (len + blade);
                    if (need[len] > 0) {
                        score += Math.min(cnt, need[len]) * len;
                        hits = true;
                    }
                }
                if (!hits) continue;
                let waste = slatLen - usedLen;
                score -= waste;
                if (score > bestScore) {
                    bestScore = score;
                    bestPattern = p;
                }
            }
            if (!bestPattern) break;
            
            let steps = Infinity;
            for (let i=0; i<lengths.length; i++) {
                if (bestPattern[i] > 0 && need[lengths[i]] > 0) {
                    steps = Math.min(steps, Math.ceil(need[lengths[i]] / bestPattern[i]));
                }
            }
            if (!isFinite(steps)) steps = 1;
            
            for (let i=0; i<lengths.length; i++) {
                need[lengths[i]] -= bestPattern[i] * steps;
            }
            plan.push({ pattern: bestPattern, count: steps });
        }
        
        let totalSticks = plan.reduce((s,item)=>s+item.count,0);
        let packs = Math.floor(totalSticks / packSize);
        let loose = totalSticks % packSize;
        
        document.getElementById('stats_area').innerHTML = `
            <div class="results-grid">
                <div class="result-item"><div class="value">${totalSticks} —ą—ā</div><div class="label">–í—Ā–Ķ–≥–ĺ —Ä–Ķ–Ķ–ļ</div></div>
                <div class="result-item"><div class="value">${packs}</div><div class="label">–ü–į—á–Ķ–ļ</div></div>
                <div class="result-item"><div class="value">${loose}</div><div class="label">–ě—Ā—ā–į—ā–ĺ–ļ</div></div>
            </div>
        `;
        
        let waText = `ūüď¶ –ó–ź–ö–ź–ó –í –†–ź–°–ü–ė–õ\n–í—Ā–Ķ–≥–ĺ —Ä–Ķ–Ķ–ļ: ${totalSticks} —ą—ā (${packs} –Ņ–į—á. + ${loose} —ą—ā.)\n\nūüõ† –ö–ź–†–Ę–ź –†–ź–°–ü–ė–õ–ź:\n`;
        let htmlMap = '';
        
        // --- –£–õ–£–ß–®–ē–Ě–ė–ē 4: –¶–≤–Ķ—ā–Ĺ—č–Ķ –ł–ļ–ĺ–Ĺ–ļ–ł –ī–Ľ—Ź —Ā—Ö–Ķ–ľ ---
        const icons = ['ūüĒĶ', 'ūüüĘ', 'ūüü†', 'ūüü£', 'ūüĒī', 'ūüü°', 'ūüü§', '‚ö™ÔłŹ'];
        
        // --- –Ě–ě–í–ě–ē: –ü–į–Ľ–ł—ā—Ä–į –ī–Ľ—Ź —Ä–į–∑–Ĺ—č—Ö —Ä–į–∑–ľ–Ķ—Ä–ĺ–≤ –≤ –Ņ–ĺ–Ľ–ĺ—Ā–ļ–Ķ ---
        const colorPalette = [
            '#007aff', // –°–ł–Ĺ–ł–Ļ
            '#34c759', // –ó–Ķ–Ľ—Ď–Ĺ—č–Ļ
            '#ff9500', // –ě—Ä–į–Ĺ–∂–Ķ–≤—č–Ļ
            '#af52de', // –§–ł–ĺ–Ľ–Ķ—ā–ĺ–≤—č–Ļ
            '#ff3b30', // –ö—Ä–į—Ā–Ĺ—č–Ļ
            '#ffcc00', // –Ė—Ď–Ľ—ā—č–Ļ
            '#5ac8fa', // –ď–ĺ–Ľ—É–Ī–ĺ–Ļ
            '#ff2d92'  // –†–ĺ–∑–ĺ–≤—č–Ļ
        ];
        // –°–ĺ–Ņ–ĺ—Ā—ā–į–≤–Ľ—Ź–Ķ–ľ —Ä–į–∑–ľ–Ķ—Ä —Ā —Ü–≤–Ķ—ā–ĺ–ľ
        let sizeColorMap = {};
        lengths.forEach((len, index) => {
            sizeColorMap[len] = colorPalette[index % colorPalette.length];
        });
        
        for (let idx=0; idx<plan.length; idx++) {
            let item = plan[idx];
            if (item.count === 0) continue;
            let pCount = Math.floor(item.count / packSize);
            let lCount = item.count % packSize;
            let countTxt = pCount > 0 ? (pCount + ' –Ņ–į—á.' + (lCount > 0 ? ` –ł ${lCount} —ą—ā.` : '')) : (lCount + ' —ą—ā.');
            
            let counts = {};
            for (let i=0; i<lengths.length; i++) {
                if (item.pattern[i] > 0) {
                    counts[lengths[i]] = item.pattern[i];
                }
            }
            
            let partsList = [];
            for (let len in counts) {
                partsList.push(`${len} —Ā–ľ ‚ÄĒ ${counts[len]} —ą—ā`);
            }
            let partsText = partsList.join(', ');
            
            let usedLenTotal = 0;
            for (let i=0; i<lengths.length; i++) {
                usedLenTotal += item.pattern[i] * (lengths[i] + blade);
            }
            let rest = slatLen - usedLenTotal;
            
            waText += `\n${idx+1}. –ü–ł–Ľ–ł—ā—Ć: ${countTxt} (${item.count} —Ä–Ķ–Ķ–ļ)\n${partsText}${rest > 0.1 ? `, –ĺ—ā—Ö–ĺ–ī ${rest.toFixed(1)} —Ā–ľ` : ''}\n`;
            
            // --- –°–Ď–ě–†–ö–ź –ü–ě–õ–ě–°–ö–ė –° –†–ź–ó–Ě–ę–ú–ė –¶–í–ē–Ę–ź–ú–ė ---
            let visual = '<div class="visual-slat">';
            let visUsed = 0;
            for (let i=0; i<lengths.length; i++) {
                let currentLen = lengths[i];
                let currentColor = sizeColorMap[currentLen] || '#007aff'; 
                for (let c=0; c<item.pattern[i]; c++) {
                    visual += `<div class="slat-part" style="flex-grow: ${currentLen}; background: ${currentColor};">${currentLen}</div>`;
                    visUsed += currentLen + blade;
                }
            }
            let visRest = slatLen - visUsed;
            if (visRest > 0.1) visual += `<div class="slat-part color-waste" style="flex-grow: ${visRest}">${visRest.toFixed(1)}</div>`;
            visual += '</div>';
            
            let icon = icons[idx % icons.length];
            
            htmlMap += `
                <div class="instruction-card">
                    <div class="inst-header">${icon} –°—Ö–Ķ–ľ–į #${idx+1} ‚ÄĒ –ü–ł–Ľ–ł—ā—Ć: ${countTxt}</div>
                    <div class="pattern-text">ūüďŹ ${partsText}${rest > 0.1 ? `, –ĺ—ā—Ö–ĺ–ī ${rest.toFixed(1)} —Ā–ľ` : ''}</div>
                    ${visual}
                </div>
            `;
        }
        
        document.getElementById('text_for_whatsapp').value = waText;
        document.getElementById('text_for_whatsapp').style.display = 'block';
        document.getElementById('map_area').innerHTML = htmlMap;
        
        // --- –ü–Ľ–į–≤–Ĺ–ĺ–Ķ –Ņ–ĺ—Ź–≤–Ľ–Ķ–Ĺ–ł–Ķ ---
        const results = document.getElementById('results');
        results.style.display = 'block';
        setTimeout(() => results.classList.add('visible'), 10);
        results.scrollIntoView({ behavior: 'smooth' });
        
    } catch(e) {
        alert('–ě—ą–ł–Ī–ļ–į: ' + e.message);
    }
}

function copyText() {
    let txt = document.getElementById('text_for_whatsapp');
    txt.select();
    txt.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(txt.value).then(() => {
        let btn = document.querySelector('.copy-btn');
        let orig = btn.innerHTML;
        btn.innerHTML = '‚úÖ –°–ļ–ĺ–Ņ–ł—Ä–ĺ–≤–į–Ĺ–ĺ!';
        setTimeout(() => btn.innerHTML = orig, 2000);
    });
}
</script>
</body>
</html>
