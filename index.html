<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Раскрой МДФ">
    <title>МДФ</title>
  <style>
:root{
    --bg-color:#0b0b0d;
    --card-bg:rgba(28,28,30,.75);
    --accent:#0a84ff;
    --accent-hover:#409cff;
    --text-main:#ffffff;
    --text-muted:#8e8e93;
    --border:rgba(255,255,255,.08);
    --success:#30d158;
    --warning:#ff9f0a;
    --waste-bg:#3a3a3c;
}

*{
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at top,#1d1d24 0%,#0b0b0d 60%);
    color:var(--text-main);
    padding:
        env(safe-area-inset-top,20px)
        15px
        env(safe-area-inset-bottom,20px)
        15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    margin:0;
    -webkit-font-smoothing:antialiased;
}

h2{
    margin-top:5px;
    font-weight:700;
    font-size:28px;
    letter-spacing:.5px;
}

.card{
    background:var(--card-bg);
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border-radius:28px;
    padding:24px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 10px 35px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.05);
}

label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:var(--text-muted);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.5px;
}

textarea,
input{
    width:100%;
    background:rgba(44,44,46,.85);
    color:white;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:14px;
    margin-bottom:15px;
    font-size:16px;
    -webkit-appearance:none;
}

textarea{
    height:140px;
    resize:none;
    font-family:monospace;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:var(--accent);
}

.input-group{
    display:flex;
    gap:12px;
}

.input-group>div{
    flex:1;
}

button{
    background:linear-gradient(180deg,#1d9bff,#007aff);
    color:white;
    padding:18px;
    border:none;
    border-radius:20px;
    width:100%;
    cursor:pointer;
    font-size:18px;
    font-weight:700;
    margin-top:10px;
    box-shadow:0 10px 25px rgba(10,132,255,.35);
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

.btn-copy{
    background:linear-gradient(180deg,#48dd73,#30d158);
    color:black;
}

.stat-box{
    background:rgba(10,132,255,.12);
    border:1px solid rgba(10,132,255,.3);
    padding:20px;
    border-radius:22px;
    text-align:center;
    margin-bottom:20px;
}

.stat-box h3{
    margin:0;
    color:#4da3ff;
    font-size:28px;
}

.stat-box p{
    margin-top:8px;
    color:var(--text-muted);
}

.visual-slat{
    height:42px;
    background:var(--waste-bg);
    display:flex;
    margin:14px 0;
    border-radius:14px;
    overflow:hidden;
}

.slat-part{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
}

.color-normal{
    background:linear-gradient(180deg,#35a0ff,#007aff);
    color:white;
}

.color-waste{
    background:#3a3a3c;
    color:#9b9b9f;
}

.instruction-card{
    background:rgba(44,44,46,.8);
    border-radius:18px;
    padding:16px;
    margin-bottom:14px;
}

.instruction-card b{
    color:white;
}

#text_for_whatsapp{
    width:100%;
    height:120px;
    background:rgba(44,44,46,.8);
    color:white;
    display:none;
    border-radius:18px;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#555;
    border-radius:10px;
}
</style>
</head>
<body>
    <div class="card">
      <div class="app-header">
    <img src="icon.png" class="logo">
    <div>
        <h1>Раскрой МДФ</h1>
        <p>Профессиональный калькулятор раскроя</p>
    </div>
</div>
        
        <label>Заказ (ШхВ - Кол-во):</label>
        <textarea id="order_input" inputmode="text">30х20 - 350
40х25 - 200</textarea>
        
        <div class="input-group">
            <div><label>Рейка (см):</label><input type="number" id="slat_len" value="272" inputmode="decimal"></div>
            <div><label>В пачке (шт):</label><input type="number" id="pack_size" value="26" inputmode="numeric"></div>
            <div><label>Диск (мм):</label><input type="number" id="blade" value="3" inputmode="decimal"></div>
        </div>
        
        <button onclick="run()">РАССЧИТАТЬ</button>
    </div>

    <div class="card" id="results" style="display: none;">
        <div id="stats_area"></div>
        <textarea id="text_for_whatsapp" readonly></textarea>
        <button class="btn-copy" id="copy_btn" onclick="copyText()">📋 В WhatsApp</button>
        <div id="map_area" style="margin-top: 25px;"></div>
    </div>

<script>
function run() {
    try {
        var text = document.getElementById('order_input').value;
        var slatLen = parseFloat(document.getElementById('slat_len').value);
        var packSize = parseInt(document.getElementById('pack_size').value);
        var blade = parseFloat(document.getElementById('blade').value) / 10;
        
        if (!text.trim()) { alert("Введите данные заказа!"); return; }

        var regex = /(\d+(?:\.\d+)?)[\sхxX×*](\d+(?:\.\d+)?)[\s\-:=]+(\d+)/g;
        var match; var demands = {};
        while ((match = regex.exec(text)) !== null) {
            var w = parseFloat(match[1]); var h = parseFloat(match[2]); var qty = parseInt(match[3]);
            demands[w] = (demands[w] || 0) + (qty * 2); demands[h] = (demands[h] || 0) + (qty * 2);
        }
        
        var hasDemands = false;
        for (var k in demands) { if (demands.hasOwnProperty(k)) { hasDemands = true; break; } }
        if (!hasDemands) { alert("Неверный формат ввода. Образец: 30х20 - 350"); return; }
        
        var uniqueLengths = [];
        for (var k in demands) {
            if (demands.hasOwnProperty(k) && demands[k] > 0) { uniqueLengths.push(Number(k)); }
        }
        uniqueLengths.sort(function(a, b) { return b - a; });
        
        var patterns = []; 
        var currentPattern = [];
        for (var i = 0; i < uniqueLengths.length; i++) { currentPattern.push(0); }
        
        function gen(idx, curLen) {
            if(idx === uniqueLengths.length) { if(curLen > 0) patterns.push(currentPattern.slice()); return; }
            var len = uniqueLengths[idx];
            var maxP = Math.floor((slatLen - curLen) / (len + blade));
            for(var i=maxP; i>=0; i--) { currentPattern[idx] = i; gen(idx+1, curLen + i*(len+blade)); }
        }
        gen(0,0);
        
        var remaining = {};
        for (var k in demands) { if (demands.hasOwnProperty(k)) { remaining[k] = demands[k]; } }
        
        function hasRemainingItems(rem) {
            for (var k in rem) { if (rem.hasOwnProperty(k) && rem[k] > 0) return true; }
            return false;
        }
        
        var plan = []; var safety = 0;
        
        while(hasRemainingItems(remaining) && safety++ < 2000) {
            var bestP = null; var bestScore = -Infinity;
            
            for(var idxP=0; idxP<patterns.length; idxP++) {
                var p = patterns[idxP];
                var score = 0; var used = 0; var hits = false;
                
                for(var i=0; i<uniqueLengths.length; i++) {
                    var len = uniqueLengths[i]; var cnt = p[i]; if(cnt===0) continue;
                    used += cnt * (len+blade);
                    if(remaining[len] > 0) { 
                        score += Math.min(cnt, remaining[len]) * len; 
                        hits = true; 
                    }
                }
                if(!hits) continue;
                
                var rest = slatLen - used;
                score -= rest;
                
                if(score > bestScore) { bestScore = score; bestP = p; }
            }
            if(!bestP) break;
            
            var steps = 999999;
            for(var i=0; i<uniqueLengths.length; i++) {
                if(bestP[i] > 0 && remaining[uniqueLengths[i]] > 0) {
                    steps = Math.min(steps, Math.ceil(remaining[uniqueLengths[i]] / bestP[i]));
                }
            }
            if(steps === 999999) steps = 1;
            for(var i=0; i<uniqueLengths.length; i++) remaining[uniqueLengths[i]] -= bestP[i] * steps;
            plan.push({pattern: bestP, count: steps});
        }
        
        var total = 0; 
        for (var i = 0; i < plan.length; i++) { total += plan[i].count; }
        
        var packs = Math.floor(total/packSize); var loose = total % packSize;
        
        var waText = "📦 ЗАКАЗ В РАСПИЛ\nВсего реек: " + total + " шт (" + packs + " пач. + " + loose + " шт.)\n";
        waText += "\n🛠 КАРТА РАСПИЛА:\n";

        var statsHtml =
'<div class="stat-box">' +

'<div style="font-size:14px;color:#8e8e93;margin-bottom:10px;">ВСЕГО РЕЕК</div>' +

'<div style="font-size:48px;font-weight:800;color:white;line-height:1;">'
+ total +
'</div>' +

'<div style="margin-top:15px;font-size:18px;color:#4da3ff;font-weight:600;">'
+ packs + ' пач. + ' + loose + ' шт.'
+ '</div>' +

'</div>';
        document.getElementById('stats_area').innerHTML = statsHtml;
        
        var html = '<h3 style="margin-bottom:15px;">Схема распила:</h3>';
        for (var idx = 0; idx < plan.length; idx++) {
            var item = plan[idx];
            if (item.count === 0) continue;
            
            var p = Math.floor(item.count/packSize); var l = item.count%packSize;
            var countTxt = p>0 ? (p + ' пач.' + (l>0 ? ' и ' + l + ' шт.' : '')) : (l + ' шт.');
            waText += "\n" + (idx+1) + ". Пилить: " + countTxt + " (всего " + item.count + " реек)\nСхема: ";
            
            var visual = '<div class="visual-slat">'; var used = 0;
            var parts = [];
            for(var i=0; i<uniqueLengths.length; i++) {
                for(var c=0; c<item.pattern[i]; c++) {
                    visual += '<div class="slat-part color-normal" style="flex-grow: ' + uniqueLengths[i] + '">' + uniqueLengths[i] + '</div>';
                    used += uniqueLengths[i] + blade;
                    parts.push(uniqueLengths[i]);
                }
            }
            waText += parts.join(' + ') + '\n';
            
            var rest = slatLen - used;
            if(rest > 0.1) visual += '<div class="slat-part color-waste" style="flex-grow: ' + rest + '">' + rest.toFixed(1) + '</div>';
            visual += '</div>';
            
            html += '<div class="instruction-card">' +
                '<span style="color:var(--accent); font-weight:600;">Рез №' + (idx+1) + '</span> — Пилить: <b>' + countTxt + '</b>' +
                visual +
            '</div>';
        }
        
        document.getElementById('text_for_whatsapp').value = waText;
        document.getElementById('text_for_whatsapp').style.display = 'block';
        document.getElementById('map_area').innerHTML = html;
        document.getElementById('results').style.display = 'block';
        
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        
    } catch(e) { alert("Ошибка при расчете: " + e.message); }
}

function copyText() {
    var copyText = document.getElementById("text_for_whatsapp");
    copyText.select();
    document.execCommand("copy");
    
    var btn = document.getElementById("copy_btn");
    var originalText = btn.innerHTML;
    btn.innerHTML = "✅ Скопировано!";
    btn.style.backgroundColor = "#32d74b";
    
    setTimeout(function() {
        btn.innerHTML = originalText;
        btn.style.backgroundColor = "var(--success)";
    }, 2000);
}
</script>
</body>
</html>
